name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_PROJECT_DIR: ${{ secrets.PROD_PROJECT_DIR }}
        run: |
          set -euo pipefail
          [ -n "${PROD_HOST:-}" ] || (echo "Missing secret: PROD_HOST" && exit 1)
          [ -n "${PROD_USER:-}" ] || (echo "Missing secret: PROD_USER" && exit 1)
          [ -n "${PROD_SSH_KEY:-}" ] || (echo "Missing secret: PROD_SSH_KEY" && exit 1)
          if [ -z "${PROD_PROJECT_DIR:-}" ]; then
            echo "PROD_PROJECT_DIR is empty; default /opt/medservice will be used."
          fi

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          debug: true
          script: |
            set -euxo pipefail
            PROJECT_DIR="${{ secrets.PROD_PROJECT_DIR }}"
            if [ -z "$PROJECT_DIR" ]; then PROJECT_DIR="/opt/medservice"; fi

            echo "User: $(whoami)"
            echo "Host: $(hostname)"
            echo "Project dir: $PROJECT_DIR"
            pwd
            ls -la "$PROJECT_DIR"
            docker --version
            docker compose version

            cd "$PROJECT_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py seed_roles || true
            docker compose -f docker-compose.prod.yml ps
