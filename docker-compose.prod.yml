services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - static_data:/app/staticfiles

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - static_data:/var/www/backend-static:ro

volumes:
  db_data:
  static_data:
