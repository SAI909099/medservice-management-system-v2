<!doctype html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Appointments</title><link rel="stylesheet" href="../css/styles.css"></head>
<body><div class="container"><h2>Appointments</h2><table id="appointments"></table></div>
<script src="../js/config.js"></script>
<script type="module">
import { apiRequest } from "../js/api.js";
import { renderTable } from "../js/render.js";
const data = await apiRequest("/appointments/");
renderTable("appointments", data.results || [], [
  { label: "ID", render: (x) => x.id },
  { label: "Patient", render: (x) => x.patient_name || x.patient },
  { label: "Doctor", render: (x) => x.doctor_name || x.doctor },
  { label: "Date", render: (x) => x.scheduled_at },
  { label: "Status", render: (x) => x.status },
]);
</script></body></html>
