<!doctype html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Login</title><link rel="stylesheet" href="../css/styles.css"></head>
<body><div class="container"><h2>Login</h2><div class="row"><input id="username" placeholder="Username"><input id="password" type="password" placeholder="Password"><button id="loginBtn">Login</button></div><p id="msg"></p></div>
<script src="../js/config.js"></script>
<script type="module">
import { login } from "../js/api.js";
document.getElementById("loginBtn").onclick = async () => {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  try { await login(username, password); location.href = "./dashboard.html"; }
  catch (e) { document.getElementById("msg").textContent = "Login failed"; }
};
</script></body></html>
