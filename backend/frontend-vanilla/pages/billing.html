<!doctype html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Billing</title><link rel="stylesheet" href="../css/styles.css"></head>
<body><div class="container"><h2>Billing</h2><table id="charges"></table></div>
<script src="../js/config.js"></script>
<script type="module">
import { apiRequest } from "../js/api.js";
import { renderTable } from "../js/render.js";
const data = await apiRequest("/charges/");
renderTable("charges", data.results || [], [
  { label: "Charge", render: (x) => x.id },
  { label: "Patient", render: (x) => x.patient },
  { label: "Total", render: (x) => x.total_amount },
  { label: "Paid", render: (x) => x.paid_amount },
  { label: "Status", render: (x) => x.status },
]);
</script></body></html>
